<div class="processos-container">
  <div class="page-header">
    <h1 class="page-title">Processos</h1>
    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Novo Processo
    </button>
  </div>

  <!-- Search Bar -->
  <mat-card class="search-card">
    <mat-form-field appearance="fill" class="search-field">
      <mat-label>Buscar processos...</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput #input (keyup)="applyFilter($event)">
    </mat-form-field>
  </mat-card>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-container">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <!-- Table -->
  <mat-card *ngIf="!isLoading" class="table-card">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="processos-table">

        <!-- Número Column -->
        <ng-container matColumnDef="numero">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nº Processo</th>
          <td mat-cell *matCellDef="let element">{{ element.numero }}</td>
        </ng-container>

        <!-- Cliente Column -->
        <ng-container matColumnDef="cliente">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Cliente</th>
          <td mat-cell *matCellDef="let element">{{ element.cliente }}</td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let element">
            <mat-chip [color]="getStatusColor(element.status)" selected>
              {{ element.status }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Tribunal Column -->
        <ng-container matColumnDef="tribunal">
          <th mat-header-cell *matHeaderCellDef>Tribunal</th>
          <td mat-cell *matCellDef="let element">{{ element.tribunal }}</td>
        </ng-container>

        <!-- Data Criação Column -->
        <ng-container matColumnDef="dataCriacao">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Data</th>
          <td mat-cell *matCellDef="let element">{{ element.dataCriacao | date:'dd/MM/yyyy' }}</td>
        </ng-container>

        <!-- Ações Column -->
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button matTooltip="Ver detalhes" (click)="viewProcesso(element)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Editar" (click)="editProcesso(element)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Deletar" (click)="deleteProcesso(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <!-- Paginator -->
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons></mat-paginator>
  </mat-card>

  <!-- Empty State -->
  <app-empty-state
    *ngIf="!isLoading && dataSource.data.length === 0"
    icon="description"
    title="Nenhum processo cadastrado"
    message="Comece adicionando um novo processo ao sistema."
    actionLabel="Novo Processo"
    actionIcon="add">
  </app-empty-state>
</div>
