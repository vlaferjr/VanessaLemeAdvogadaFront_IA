<div class="clientes-container">
  <div class="page-header">
    <h1 class="page-title">Clientes</h1>
    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Novo Cliente
    </button>
  </div>

  <!-- Search Bar -->
  <mat-card class="search-card">
    <mat-form-field appearance="fill" class="search-field">
      <mat-label>Buscar clientes...</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput #input (keyup)="applyFilter($event)">
    </mat-form-field>
  </mat-card>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-container">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <!-- Table -->
  <mat-card *ngIf="!isLoading" class="table-card">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="clientes-table">

        <!-- Nome Column -->
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
          <td mat-cell *matCellDef="let element">{{ element.nome }}</td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>E-mail</th>
          <td mat-cell *matCellDef="let element">{{ element.email }}</td>
        </ng-container>

        <!-- Telefone Column -->
        <ng-container matColumnDef="telefone">
          <th mat-header-cell *matHeaderCellDef>Telefone</th>
          <td mat-cell *matCellDef="let element">{{ element.telefone }}</td>
        </ng-container>

        <!-- Data Criação Column -->
        <ng-container matColumnDef="dataCriacao">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Data Criação</th>
          <td mat-cell *matCellDef="let element">{{ element.dataCriacao | date:'dd/MM/yyyy' }}</td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let element">
            <mat-chip [color]="element.status === 'Ativo' ? 'accent' : 'warn'" selected>
              {{ element.status }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Ações Column -->
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button matTooltip="Ver detalhes" (click)="viewCliente(element)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Editar" (click)="editCliente(element)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Deletar" (click)="deleteCliente(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <!-- Paginator -->
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons></mat-paginator>
  </mat-card>

  <!-- Empty State -->
  <app-empty-state
    *ngIf="!isLoading && dataSource.data.length === 0"
    icon="people"
    title="Nenhum cliente cadastrado"
    message="Comece adicionando um novo cliente ao sistema."
    actionLabel="Novo Cliente"
    actionIcon="add">
  </app-empty-state>
</div>
