<mat-toolbar color="primary" class="navbar">
  <button mat-icon-button (click)="onToggleSidenav()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="spacer"></span>

  <!-- User Menu -->
  <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu" class="user-menu">
    <button mat-menu-item disabled>
      <span *ngIf="authService.currentUser$ | async as user">{{ user.email }}</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item routerLink="/dashboard">
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </button>
    <button mat-menu-item disabled>
      <mat-icon>settings</mat-icon>
      <span>Configurações</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()" [disabled]="isLoading">
      <mat-icon *ngIf="!isLoading">logout</mat-icon>
      <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
